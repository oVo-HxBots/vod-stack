# 👇 THIS PART MUST BE AT TOP LEVEL (http context)
log_format stream '$remote_addr $arg_token $body_bytes_sent';

server {
    listen 80;

    location /media/ {
        alias /mnt/;
        autoindex on;
    }
    # AUTH CHECK (token validation)
    location = /auth_token {
        internal;
        proxy_pass http://vod:5000/validate_token;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }


    location /playlist.m3u {
        proxy_pass http://vod:5000/playlist.m3u;
    }

    location /epg.xml {
        proxy_pass http://vod:5000/epg.xml;
    }

    location /api {
        proxy_pass http://vod:5000/api;
    }
    
    # STREAM
    location /stream/ {
        auth_request /auth_token;

        proxy_pass http://localhost:8001/;

        proxy_set_header Host $host;

        # ✅ logging works now
        access_log /var/log/nginx/stream.log stream;
    }

    # APP
    location / {
        proxy_pass http://vod:5000;
    }
}
