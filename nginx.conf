# 👇 THIS PART MUST BE AT TOP LEVEL (http context)
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=vod_cache:10m max_size=20g inactive=24h use_temp_path=off;


server {

    listen 80;

    location /media/ {
        alias /mnt/;
        autoindex on;
    }
    # AUTH CHECK (token validation)
    location = /auth_token {
        internal;
        proxy_pass http://vod:5000/validate_token;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }


    location /playlist.m3u {
        proxy_pass http://vod:5000/playlist.m3u;
    }

    location /epg.xml {
        proxy_pass http://vod:5000/epg.xml;
    }

    location /api {
        proxy_pass http://vod:5000/api;
    }
    
    # STREAM
    location /stream/ {

    # strip /stream prefix → pass to alist
    rewrite ^/stream/(.*)$ /d/$1 break;

    proxy_pass https://vod.stableserver.one;

    proxy_set_header Host $host;

    # 🔥 required for video streaming
    proxy_set_header Range $http_range;
    proxy_set_header If-Range $http_if_range;

    proxy_buffering off;

    # optional debug
    add_header X-Source "alist-proxy";
}

    # APP
    location / {
        proxy_pass http://vod:5000;
    }
}
