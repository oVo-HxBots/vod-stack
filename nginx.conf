server {
    listen 80;

    # auth check
    location = /auth_token {
        internal;
        proxy_pass http://vod:5000/validate_token;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # STREAM
    location /stream/ {
        auth_request /auth_token;

        proxy_pass http://localhost:8001/;

        proxy_set_header Host $host;

        # bandwidth logging
        log_format stream '$remote_addr $arg_token $body_bytes_sent';
        access_log /var/log/nginx/stream.log stream;
    }

    location / {
        proxy_pass http://vod:5000;
    }
}
