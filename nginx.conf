worker_processes auto;

events {
    worker_connections 1024;
}

http {

    # 🔥 CACHE (for future use)
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=vod_cache:10m max_size=20g inactive=24h use_temp_path=off;

    server {
        listen 80;

        # LOCAL MEDIA (optional)
        location /media/ {
            alias /mnt/;
            autoindex on;
        }

        # AUTH CHECK
        location = /auth_token {
            internal;
            proxy_pass http://vod:5000/validate_token;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        # PLAYLIST
        location /playlist.m3u {
            proxy_pass http://vod:5000/playlist.m3u;
        }

        location /epg.xml {
            proxy_pass http://vod:5000/epg.xml;
        }

        location /api {
            proxy_pass http://vod:5000/api;
        }

        # 🚀 STREAM (IMPORTANT FIX)
        location /stream/ {
            proxy_pass http://vod:5000;

            proxy_set_header Host $host;

            # 🔥 REQUIRED FOR VIDEO
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;

            proxy_buffering off;
            proxy_request_buffering off;

            # timeouts
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
        }

        # APP UI
        location / {
            proxy_pass http://vod:5000;
        }
    }
}
