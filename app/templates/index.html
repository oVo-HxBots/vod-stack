<!DOCTYPE html>
<html>
<head>
  <title>VOD</title>
  <style>
    body { background:#141414; color:white; font-family:Arial; margin:0 }
    header { padding:15px; background:black }
    .row { margin:20px }
    .scroll { display:flex; overflow-x:auto; gap:10px }
    .card { min-width:150px; cursor:pointer }
    .card img { width:150px; border-radius:5px }
  </style>
</head>

<body>

<header>🎬 VOD</header>

<div id="content"></div>

<script>
fetch('/api')
  .then(r=>r.json())
  .then(data=>{
    Object.keys(data).forEach(cat=>{
      const row = document.createElement('div')
      row.className='row'

      row.innerHTML = `<h2>${cat}</h2><div class="scroll"></div>`
      const scroll = row.querySelector('.scroll')

      data[cat].forEach(item=>{
        const c = document.createElement('div')
        c.className='card'
        c.innerHTML = `<img src="${item.poster}">`
        c.onclick = ()=> window.location="/player?url="+encodeURIComponent(item.url)
        scroll.appendChild(c)
      })

      document.getElementById('content').appendChild(row)
    })
  })
</script>

</body>
</html>
