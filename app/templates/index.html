<!DOCTYPE html>
<html>
<head>
  <title>VOD Stack</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      background: #141414;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    header {
      padding: 15px;
      font-size: 22px;
      background: black;
    }

    .row {
      margin: 20px;
    }

    .row h2 {
      margin-bottom: 10px;
    }

    .scroll {
      display: flex;
      overflow-x: auto;
      gap: 10px;
    }

    .card {
      min-width: 150px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.1);
    }

    .card img {
      width: 150px;
      border-radius: 5px;
    }

    .scroll::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<body>

<header>🎬 VOD Stack</header>

<div id="content"></div>

<script>
fetch('/api')
  .then(res => res.json())
  .then(data => {
    renderCategory("Movies", data.movies);
    renderCategory("Series", data.series);
  });

function renderCategory(title, items) {
  const container = document.getElementById('content');

  const row = document.createElement('div');
  row.className = 'row';

  row.innerHTML = `<h2>${title}</h2><div class="scroll"></div>`;

  const scroll = row.querySelector('.scroll');

  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `<img src="${item.poster}" />`;

    card.onclick = () => {
      window.location = "/player?url=" + encodeURIComponent(item.url);
    };

    scroll.appendChild(card);
  });

  container.appendChild(row);
}
</script>

</body>
</html>

      cursor: pointer;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 6px;

    .title {
      font-size: 14px;

  </style>
</head>

<body>

<header>🎬 VOD Stack</header>

<input class="search" placeholder="Search..." onkeyup="filter()" id="search">

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script>
let data = [];

fetch('/api')
  .then(res => res.json())
  .then(json => {
    data = [...json.movies, ...json.series];
    render(data);
  });

function render(items) {
  const grid = document.getElementById('grid');
  grid.innerHTML = "";

  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'card';

    el.innerHTML = `
      <img src="${item.poster}" />
      <div class="title">${item.title}</div>
    `;

    el.onclick = () => {
      window.open(item.url, '_blank');
    };

    grid.appendChild(el);
  });
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = data.filter(x => x.title.toLowerCase().includes(q));
  render(filtered);
}
</script>

</body>
</html>
