<!DOCTYPE html>
<html>
<head>
  <title>VOD</title>

  <style>
    body {
      margin:0;
      background:#141414;
      color:white;
      font-family:Arial;
    }

    header {
      background:black;
      padding:15px;
      font-size:20px;
    }

    .row {
      margin:20px;
    }

    .scroll {
      display:flex;
      overflow-x:auto;
      gap:10px;
    }

    .card {
      min-width:160px;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover {
      transform:scale(1.1);
    }

    .card img {
      width:160px;
      border-radius:6px;
    }

    .title {
      font-size:12px;
      margin-top:5px;
    }
  </style>
</head>

<body>

<header>🎬 VOD</header>

<div id="content"></div>

<script>
fetch('/api')
  .then(r=>r.json())
  .then(data=>{
    Object.keys(data).forEach(cat=>{
      const row = document.createElement('div')
      row.className = 'row'

      row.innerHTML = `<h2>${cat}</h2><div class="scroll"></div>`
      const scroll = row.querySelector('.scroll')

      data[cat].forEach(item=>{
        const card = document.createElement('div')
        card.className = 'card'

        card.innerHTML = `
          <img src="${item.poster}">
          <div class="title">${item.title}</div>
        `

        card.onclick = () => {
          const encoded = btoa(item.url)
          window.location = "/player?url=" + encoded
        }
        }

        scroll.appendChild(card)
      })

      document.getElementById('content').appendChild(row)
    })
  })
</script>

</body>
</html>
