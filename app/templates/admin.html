<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    header {
      background:black;
      padding:15px;
      font-size:20px;
    }

    .container {
      padding:20px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:20px;
    }

    .card {
      background:#181818;
      padding:20px;
      border-radius:10px;
    }

    input,button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:5px;
    }

    button {
      background:#e50914;
      color:white;
      cursor:pointer;
    }

    table {
      width:100%;
      margin-top:10px;
    }

    td,th {
      padding:8px;
      border-bottom:1px solid #333;
    }

    pre {
      background:#000;
      padding:10px;
    }
  </style>
</head>

<body>

<header>⚙️ Admin Dashboard</header>

<div class="container">

<div class="grid">

<!-- USERS -->
<div class="card">
<h3>👤 Users</h3>

<input id="u" placeholder="username">
<input id="p" placeholder="password">
<input id="c" type="number" placeholder="max connections">
<input id="e" placeholder="expiry timestamp">

<button onclick="addUser()">Add</button>

<table id="users"></table>
</div>

<!-- STATS -->
<div class="card">
<h3>📊 Stats</h3>
<pre id="stats"></pre>
</div>

<!-- GRAPH -->
<div class="card">
<h3>📈 Usage</h3>
<canvas id="chart"></canvas>
</div>

<!-- STREAMS -->
<div class="card">
<h3>📡 Active Streams</h3>
<pre id="streams"></pre>
</div>

<!-- BANDWIDTH -->
<div class="card">
<h3>📶 Bandwidth</h3>
<pre id="bw"></pre>
</div>

<!-- VOD -->
<div class="card">
<h3>🎬 VOD</h3>
<button onclick="scan()">Scan Library</button>
</div>

</div>

</div>

<script>
/* USER MANAGEMENT */

function addUser() {
  fetch('/admin/user/add',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      username:u.value,
      password:p.value,
      max_conn:parseInt(c.value),
      expires:parseInt(e.value)
    })
  }).then(loadUsers)
}

function delUser(name) {
  fetch('/admin/user/delete',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username:name})
  }).then(loadUsers)
}

function toggleUser(name) {
  fetch('/admin/user/toggle',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username:name})
  }).then(loadUsers)
}

function loadUsers() {
  fetch('/admin/users')
    .then(r=>r.json())
    .then(d=>{
      let html = "<tr><th>User</th><th>Actions</th></tr>"

      d.users.forEach(x=>{
        html += `
        <tr>
          <td>${x[0]}</td>
          <td>
            <button onclick="toggleUser('${x[0]}')">Suspend</button>
            <button onclick="delUser('${x[0]}')">Delete</button>
          </td>
        </tr>`
      })

      users.innerHTML = html
    })
}

/* SCAN */

function scan() {
  fetch('/scan').then(r=>r.json()).then(alert)
}

/* STATS */

function loadStats() {
  fetch('/admin/stats')
    .then(r=>r.json())
    .then(d=>{
      stats.innerText = JSON.stringify(d,null,2)

      chart.data.labels.push(new Date().toLocaleTimeString())
      chart.data.datasets[0].data.push(d.total_users)
      chart.update()
    })
}

/* STREAMS */

function loadStreams() {
  fetch('/admin/streams')
    .then(r=>r.json())
    .then(d=>{
      streams.innerText = JSON.stringify(d,null,2)
    })
}

/* BANDWIDTH */

function loadBW() {
  fetch('/admin/bandwidth')
    .then(r=>r.json())
    .then(d=>{
      bw.innerText = JSON.stringify(d,null,2)
    })
}

/* GRAPH */

let chart = new Chart(document.getElementById("chart"), {
  type:"line",
  data:{
    labels:[],
    datasets:[{ label:"Users", data:[] }]
  }
})

/* AUTO REFRESH */

setInterval(()=>{
  loadStats()
  loadStreams()
  loadBW()
}, 5000)

loadUsers()
loadStats()
loadStreams()
loadBW()
</script>

</body>
</html>
