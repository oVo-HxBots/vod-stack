<!DOCTYPE html>
<html>
<head>
  <title>Player</title>
  <style>
    body { margin:0; background:black }
    video { width:100%; height:100vh }
  </style>
</head>

<body>

<video controls autoplay id="v"></video>

<script>
const encoded = new URLSearchParams(location.search).get("url")
const url = atob(encoded)

document.getElementById("v").src = url
</script>

</body>
</html>
